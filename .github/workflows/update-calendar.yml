name: Update Economic Calendar ICS

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate calendar.ics
        run: python calendar.py

      - name: Commit updated calendar
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add calendar.ics
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Update economic calendar"
          git push
